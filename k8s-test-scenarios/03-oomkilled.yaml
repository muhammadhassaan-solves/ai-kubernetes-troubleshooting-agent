apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-killed-demo
  namespace: ai-kubernetes-agent-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-killed-demo
  template:
    metadata:
      labels:
        app: oom-killed-demo
    spec:
      containers:
        - name: app
          image: python:3.12-alpine
          command:
            - python
            - -c
            - 'data=[]; [data.append("x"*1024*1024) for _ in range(256)]'
          resources:
            limits:
              memory: 32Mi
            requests:
              memory: 16Mi

