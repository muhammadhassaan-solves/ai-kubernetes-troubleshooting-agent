apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-env-crashloop
  namespace: ai-kubernetes-agent-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-env-crashloop
  template:
    metadata:
      labels:
        app: missing-env-crashloop
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'echo "DATABASE_URL missing"; exit 1'

